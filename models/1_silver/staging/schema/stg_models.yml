
version: 2

models:
  
  - name: stg_events
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: event_id
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        tests:
          - not_null
          - unique

      - name: event_timestamp
        data_type: timestamp
        description: >
          Timestamp indicating when the event occurred. Used for funnel analysis,
          attribution logic, time-based aggregations, and cohort calculations.
        tests:
          - not_null

      - name: customer_id
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: campaign_id_clean
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_campaigns')
                field: campaign_id

  - name: stg_transactions
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: transaction_id
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        tests:
          - not_null
          - unique

      - name: customer_id
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: campaign_id_clean
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_campaigns')
                field: campaign_id

  - name: stg_products
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: product_id
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        tests:
          - not_null
          - unique

  - name: stg_customers
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: customer_id
        data_type: string
        description: >
          "Unique identifier for each customer."
        tests:
          - not_null
          - unique

      - name: customer_signup_date
        data_type: date
        description: >
          "Date when the customer signed up or was first registered."
        tests:
          - not_null

      - name: customer_country
        data_type: string
        description: >
          "Country code representing the customer's location (e.g., AU)."
        tests:
          - not_null

      - name: customer_age
        data_type: int64
        description: >
          "Customer age in years at the time of signup."
        tests:
          - not_null

      - name: customer_gender
        data_type: string
        description: >
          "Customer self-reported gender (e.g., Female, Male, Other)."
        tests:
          - not_null

      - name: customer_loyalty_tier
        data_type: string
        description: >
          "Customer loyalty program tier indicating engagement/value level (e.g., Bronze, Silver, Gold, Platinum)."
        tests:
          - not_null

      - name: customer_acquisition_channel
        data_type: string
        description: >
          "Primary channel through which the customer was acquired (e.g., Paid Search, Social, Email, Organic, Referral)."
        tests:
          - not_null

  - name: stg_campaigns
    description: >
      "This model standardizes and stores marketing campaign data across various channels, objectives, and customer segments. 
      It provides a unified view to support analysis of campaign performance and targeting strategies."
    columns:
      - name: campaign_id
        data_type: string
        description: >
           "Unique identifier for each marketing campaign."
        tests:
          - not_null
          - unique

      - name: campaign_channel
        data_type: string
        description: >
           "The marketing channel used in the campaign, such as Email, Social, Display, or Paid Search."
        tests:
          - not_null

      - name: campaign_objective
        data_type: string
        description: >
           "The primary goal of the campaign, such as Acquisition, Retention, Reactivation, or Cross-sell."
        tests:
          - not_null

      - name: campaign_start_date
        data_type: date
        description: >
           "The date on which the campaign started."

      - name: campaign_end_date
        data_type: date
        description: >
           "The date on which the campaign ended."

      - name: campaign_target_segment
        data_type: string
        description: >
           "The specific customer segment targeted by the campaign, such as All, Churn Risk, Deal Seekers, New Customers, or High Value."
        tests:
          - not_null

      - name: campaign_expected_uplift
        data_type: numeric
        description: >
           "The expected increase in desired outcomes (e.g., conversions or revenue) attributed to the campaign."
