
version: 2

models:
  
  - name: fact_cohort_monthly
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - cohort_month
              - months_since_first_purchase
    columns:
      - name: months_since_first_purchase
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).

      - name: cohort_month
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

  - name: fact_events
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: event_id
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        tests:
          - not_null
          - unique
        
      - name: customer_id
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
        
      - name: campaign_id
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_campaign')
                field: campaign_id
        
      - name: product_id
        data_type: string
        description: >
          Unique identifier of the customer associated with the event. 
          Enables linking event-level interactions to customer-level data 
          for conversion, retention, and LTV analysis.
        tests:
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_id

      - name: date
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day


