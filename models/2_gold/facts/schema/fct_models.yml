
version: 2

models:
  
  - name: fact_cohort_monthly
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - cohort_month
              - months_since_first_purchase
    columns:
      - name: months_since_first_purchase
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).

      - name: cohort_month
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
    
  - name: fact_events
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: event_id
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        tests:
          - not_null
          - unique

  - name: fact_funnel_daily
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_day
              - campaign_id
    columns:
      - name: date_day
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).

  - name: fact_transactions
    description: >
      "This model standardizes customer master data, including signup attributes, demographics, loyalty segmentation, and acquisition source. 
      It supports cohort analysis, customer segmentation, and marketing attribution."
    columns:
      - name: transaction_id
        data_type: string
        description: >
          Unique identifier for each tracked event generated by a user interaction 
          within the marketing funnel (e.g., click, view, signup, conversion).
        tests:
          - not_null
          - unique
